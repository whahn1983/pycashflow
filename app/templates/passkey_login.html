{% extends "base.html" %}

{% block content %}

<div style="max-width: 500px; margin: 4rem auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 0.5rem;">
            <i class="fa-solid fa-chart-line"></i> PyCashFlow
        </h1>
        <p style="color: var(--text-secondary);">Sign in with your passkey</p>
    </div>

    <div class="metric-card" style="padding: 2rem;">
        <div class="form-group-modern">
            <label class="form-label-modern"><i class="fa-solid fa-envelope"></i> Email Address</label>
            <input id="passkey-email" type="email" class="form-control-modern" placeholder="your@email.com" required autofocus>
        </div>

        <button id="passkey-login-btn" type="button" class="btn-primary-modern btn-modern" style="width: 100%; margin-top: 1rem;">
            <i class="fa-solid fa-key"></i> Continue with Passkey
        </button>

        <div id="passkey-error" style="display: none; color: var(--danger); margin-top: 1rem;"></div>

        <div style="margin-top: 1.5rem; text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--border);">
            <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Prefer traditional login?</p>
            <a href="{{url_for('auth.login')}}" style="color: var(--accent); text-decoration: none; font-weight: 600;">
                <i class="fa-solid fa-right-to-bracket"></i>
                Sign In with Email & Password
            </a>
        </div>
    </div>
</div>

<script>
function base64urlToUint8Array(base64url) {
    const padding = '='.repeat((4 - base64url.length % 4) % 4);
    const base64 = (base64url + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(base64);
    return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}

function uint8ArrayToBase64url(bytes) {
    const str = String.fromCharCode(...new Uint8Array(bytes));
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}

async function beginPasskeyLogin() {
    const email = document.getElementById('passkey-email').value.trim().toLowerCase();
    const errorEl = document.getElementById('passkey-error');
    errorEl.style.display = 'none';

    if (!email) {
        errorEl.textContent = 'Please enter your email address.';
        errorEl.style.display = 'block';
        return;
    }

    const optionsResp = await fetch('{{ url_for("auth.passkey_login_options") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token() }}',
        },
        body: JSON.stringify({ email }),
    });

    const options = await optionsResp.json();
    if (!optionsResp.ok) {
        errorEl.textContent = options.error || 'Could not start passkey login.';
        errorEl.style.display = 'block';
        return;
    }

    options.challenge = base64urlToUint8Array(options.challenge);
    if (options.allowCredentials) {
        options.allowCredentials = options.allowCredentials.map((cred) => ({
            ...cred,
            id: base64urlToUint8Array(cred.id),
        }));
    }

    const assertion = await navigator.credentials.get({ publicKey: options });

    const payload = {
        id: assertion.id,
        rawId: uint8ArrayToBase64url(assertion.rawId),
        type: assertion.type,
        response: {
            authenticatorData: uint8ArrayToBase64url(assertion.response.authenticatorData),
            clientDataJSON: uint8ArrayToBase64url(assertion.response.clientDataJSON),
            signature: uint8ArrayToBase64url(assertion.response.signature),
            userHandle: assertion.response.userHandle ? uint8ArrayToBase64url(assertion.response.userHandle) : null,
        },
        clientExtensionResults: assertion.getClientExtensionResults(),
    };

    const verifyResp = await fetch('{{ url_for("auth.login_passkey_post") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token() }}',
        },
        body: JSON.stringify(payload),
    });

    if (verifyResp.redirected) {
        window.location.href = verifyResp.url;
        return;
    }

    window.location.href = '{{ url_for("main.index") }}';
}

document.getElementById('passkey-login-btn').addEventListener('click', async () => {
    try {
        await beginPasskeyLogin();
    } catch (err) {
        const errorEl = document.getElementById('passkey-error');
        errorEl.textContent = err.message || 'Passkey authentication failed.';
        errorEl.style.display = 'block';
    }
});
</script>

{% endblock %}
