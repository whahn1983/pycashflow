<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>PyCashFlow — Offline</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.75rem;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 380px;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        button {
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #2563eb; }

        .brand {
            position: fixed;
            top: 1.25rem;
            left: 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #3b82f6;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <a href="/" class="brand">
        &#x1F4C8; PyCashFlow
    </a>

    <div class="badge">No Connection</div>
    <div class="icon">&#x1F6AB;</div>
    <h1>You're offline</h1>
    <p>
        PyCashFlow couldn't reach the server. If you've visited this page before,
        try navigating back — your last view may still be available from cache.
    </p>
    <button onclick="window.location.reload()">Try Again</button>

    <script>
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
