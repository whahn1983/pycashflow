<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PyCashFlow</title>

    <!-- Favicons -->
    <link rel="shortcut icon" href="{{ url_for('main.favicon') }}">
    <link rel="apple-touch-icon" href="{{ url_for('main.appleicon') }}">
    <link rel="icon" href="./static/favicon.ico">
    <link rel="icon" href="{{url_for('static', filename='icons/icon_144x144.png')}}" type="image/png">
    <link rel="icon" href="{{url_for('static', filename='icons/icon_192x192.png')}}" type="image/png">
    <link rel="icon" href="{{url_for('static', filename='icons/icon_512x512.png')}}" type="image/png">
    <link rel="apple-touch-icon" href="{{url_for('static', filename='icons/icon_144x144.png')}}" type="image/png">
    <link rel="apple-touch-icon" href="{{url_for('static', filename='icons/icon_192x192.png')}}" type="image/png">
    <link rel="apple-touch-icon" href="{{url_for('static', filename='icons/icon_512x512.png')}}" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Bootstrap 5.3 (No jQuery required) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Improved Custom CSS -->
    <link rel="stylesheet" href="./static/css/improved.css"/>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register("/sw.js").then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    registration.update();
                    window.addEventListener('online', function() { registration.update(); });
                    document.addEventListener('visibilitychange', function() {
                        if (document.visibilityState === 'visible') registration.update();
                    });
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });

            // Clear page cache on logout so stale financial data is not left on device
            document.addEventListener('DOMContentLoaded', function() {
                var logoutLink = document.querySelector('a[href="/logout"]');
                if (logoutLink) {
                    logoutLink.addEventListener('click', function() {
                        if (navigator.serviceWorker.controller) {
                            navigator.serviceWorker.controller.postMessage('CLEAR_PAGE_CACHE');
                        }
                    });
                }
            });
        }
    </script>
</head>

<body>
    <!-- Offline Status Banner -->
    <div id="offline-banner" style="display:none; position:fixed; top:0; left:0; right:0; z-index:999; background:rgba(239,68,68,0.95); color:#fff; text-align:center; padding:0.5rem 1rem; font-size:0.875rem; font-weight:600;">
        You are offline — showing cached data
    </div>
    <script>
        (function() {
            var banner = document.getElementById('offline-banner');
            function positionBanner() {
                var nav = document.querySelector('.navbar-improved');
                if (nav) banner.style.top = nav.offsetHeight + 'px';
            }
            function update() {
                banner.style.display = navigator.onLine ? 'none' : 'block';
                if (!navigator.onLine) positionBanner();
            }
            document.addEventListener('DOMContentLoaded', function() {
                positionBanner();
                window.addEventListener('resize', positionBanner);
            });
            update();
            window.addEventListener('online', update);
            window.addEventListener('offline', update);
        })();
    </script>

    <!-- Improved Navigation Bar (Guest View - Limited) -->
    <nav class="navbar-improved">
        <div class="container-modern" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/" class="brand">
                <i class="fa-solid fa-chart-line"></i>
                PyCashFlow
            </a>

            <!-- Hamburger Toggle (Mobile Only) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Navigation Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav-container">
                    <a href="/" class="nav-link">
                        <i class="fa-solid fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="/settings" class="nav-link">
                        <i class="fa-solid fa-gear"></i>
                        <span>Settings</span>
                    </a>
                    <a href="/logout" class="nav-link">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-modern">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
